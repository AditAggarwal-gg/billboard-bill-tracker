<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Billboard – Bill Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#0A0A0F;color:#E8E8F0;font-family:'DM Sans',sans-serif}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
  .card{background:#13131A;border:1px solid #1E1E2E;border-radius:16px}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:500;border-radius:10px;transition:all .2s}
  .btn:hover{opacity:.85;transform:translateY(-1px)}
  .bill-row:hover{background:#1A1A25!important}
  .nav-btn{background:none;border:none;cursor:pointer;font-family:inherit;color:#888;padding:8px 16px;border-radius:8px;font-size:13px;transition:all .2s}
  .nav-btn.active{background:#1E1E2E;color:#E8E8F0}
  .input{background:#0F0F18;border:1px solid #2A2A3E;border-radius:10px;color:#E8E8F0;font-family:inherit;font-size:14px;padding:10px 14px;width:100%;outline:none;transition:border .2s}
  .input:focus{border-color:#00E5CC}
  .input option{background:#0F0F18}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
  .modal{background:#13131A;border:1px solid #2A2A3E;border-radius:20px;padding:28px;width:420px;max-width:95vw}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .3s ease forwards}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .pulse{animation:pulse 1.5s infinite}
  .hidden{display:none!important}
  #header{padding:24px 32px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1E1E2E}
  #main{padding:28px 32px;max-width:1100px;margin:0 auto}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
  .stat-card{padding:20px}
  .stat-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .stat-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}
  .stat-sub{font-size:11px;color:#555;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .progress-card{padding:22px;margin-bottom:24px}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .section-label{font-size:13px;color:#888;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
  .bill-mini{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1A1A28}
  .bill-mini-left{display:flex;align-items:center;gap:10px}
  .bill-mini-icon{font-size:18px}
  .bill-mini-name{font-size:13px;font-weight:500}
  .bill-mini-meta{font-size:11px;color:#555}
  .bill-mini-amount{font-weight:600;font-size:14px;text-align:right}
  .table-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;padding:12px 20px;border-bottom:1px solid #1E1E2E;font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px}
  .table-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;padding:14px 20px;border-bottom:1px solid #1A1A24;align-items:center;transition:background .15s}
  .row-name{font-weight:500;font-size:14px}
  .row-note{font-size:11px;color:#555}
  .row-amount{font-weight:600}
  .row-day{color:#888;font-size:13px}
  .row-actions{display:flex;gap:8px}
  .ai-box{background:#0F0F18;border-radius:10px;padding:16px;font-size:13px;line-height:1.7;color:#C0C0D0;white-space:pre-wrap;max-height:300px;overflow-y:auto}
  .ai-empty{text-align:center;padding:30px 0;color:#333;font-size:13px}
  .ai-empty-icon{font-size:32px;margin-bottom:10px}
  .form-label{font-size:11px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;display:block}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:22px}
  .modal-actions{display:flex;gap:10px;margin-top:24px}
  .legend{display:flex;gap:20px;margin-top:12px}
  .legend-item{font-size:11px;color:#666}
  .filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
  .bill-count{margin-left:auto;font-size:13px;color:#555}
  @media(max-width:700px){
    .stats-grid{grid-template-columns:1fr 1fr}
    .two-col{grid-template-columns:1fr}
    .table-header,.table-row{grid-template-columns:1fr auto}
    .table-header span:not(:first-child):not(:last-child){display:none}
    .table-row>div:not(:first-child):not(:last-child){display:none}
    #header{flex-direction:column;gap:14px;align-items:flex-start}
  }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div>
    <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px">
      <span style="color:#00E5CC">bill</span>board
    </div>
    <div id="currentMonth" style="font-size:12px;color:#555;margin-top:2px"></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="nav-btn active" onclick="switchView('dashboard')" id="navDashboard">Dashboard</button>
    <button class="nav-btn" onclick="switchView('bills')" id="navBills">All Bills</button>
    <button class="btn" onclick="openAdd()" style="background:#00E5CC;color:#000;padding:8px 18px;font-size:13px">+ Add Bill</button>
  </div>
</div>

<div id="main">

  <!-- DASHBOARD VIEW -->
  <div id="viewDashboard" class="fade-in">
    <div class="stats-grid">
      <div class="card stat-card">
        <div class="stat-label">Monthly Total</div>
        <div class="stat-value" id="statTotal" style="color:#00E5CC">$0</div>
        <div class="stat-sub" id="statTotalSub"></div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Paid This Month</div>
        <div class="stat-value" id="statPaid" style="color:#26de81">$0</div>
        <div class="stat-sub" id="statPaidSub"></div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Overdue</div>
        <div class="stat-value" id="statOverdue" style="color:#FC5C7D">$0</div>
        <div class="stat-sub" id="statOverdueSub"></div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Due This Week</div>
        <div class="stat-value" id="statWeek" style="color:#F7B731">0</div>
        <div class="stat-sub" id="statWeekSub"></div>
      </div>
    </div>

    <div class="card progress-card">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:13px;color:#888">Monthly Payment Progress</span>
        <span style="font-size:13px;font-weight:600" id="progressPct">0% paid</span>
      </div>
      <div style="background:#1E1E2E;border-radius:6px;height:8px;overflow:hidden">
        <div id="progressBar" style="width:0%;height:100%;background:linear-gradient(90deg,#00E5CC,#26de81);border-radius:6px;transition:width .6s ease"></div>
      </div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="two-col">
      <div class="card" style="padding:22px">
        <div class="section-label">Upcoming Bills</div>
        <div id="upcomingList"></div>
      </div>
      <div class="card" style="padding:22px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div class="section-label" style="margin-bottom:0">AI Insights</div>
          <button class="btn" onclick="getAIInsight()" id="aiBtn" style="background:#7C5CFC22;color:#7C5CFC;border:1px solid #7C5CFC44;padding:6px 14px;font-size:12px">✦ Analyze</button>
        </div>
        <div id="aiArea">
          <div class="ai-empty">
            <div class="ai-empty-icon">✦</div>
            Click Analyze to get personalized insights
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- BILLS VIEW -->
  <div id="viewBills" class="hidden fade-in">
    <div class="filter-bar">
      <button class="nav-btn active" onclick="setFilter('all')" id="filterAll">All</button>
      <button class="nav-btn" onclick="setFilter('upcoming')" id="filterUpcoming">Upcoming</button>
      <button class="nav-btn" onclick="setFilter('paid')" id="filterPaid">Paid</button>
      <button class="nav-btn" onclick="setFilter('overdue')" id="filterOverdue">Overdue</button>
      <span class="bill-count" id="billCount"></span>
    </div>
    <div class="card" style="overflow:hidden">
      <div class="table-header">
        <span>Bill</span><span>Amount</span><span>Due Day</span><span>Status</span><span>AutoPay</span><span></span>
      </div>
      <div id="billsTable"></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="overlay hidden" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal fade-in">
    <div class="modal-title" id="modalTitle">Add New Bill</div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label class="form-label">Bill Name</label>
        <input class="input" id="fName" placeholder="e.g. Electricity"/>
      </div>
      <div class="form-row">
        <div>
          <label class="form-label">Amount ($)</label>
          <input class="input" id="fAmount" type="number" placeholder="0.00"/>
        </div>
        <div>
          <label class="form-label">Due Day of Month</label>
          <input class="input" id="fDueDay" type="number" min="1" max="31" placeholder="1-31"/>
        </div>
      </div>
      <div>
        <label class="form-label">Category</label>
        <select class="input" id="fCategory">
          <option value="utilities">⚡ Utilities</option>
          <option value="internet">📡 Internet</option>
          <option value="insurance">🛡️ Insurance</option>
          <option value="rent">🏠 Rent / Mortgage</option>
          <option value="subscriptions">📦 Subscriptions</option>
          <option value="other">📋 Other</option>
        </select>
      </div>
      <div>
        <label class="form-label">Status</label>
        <select class="input" id="fStatus">
          <option value="upcoming">Upcoming</option>
          <option value="paid">Paid</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>
      <div>
        <label class="form-label">Notes (optional)</label>
        <input class="input" id="fNotes" placeholder="Provider name, account #..."/>
      </div>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:#888">
        <input type="checkbox" id="fAutoPay" style="accent-color:#00E5CC;width:16px;height:16px"/>
        AutoPay enabled
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()" style="flex:1;background:#1E1E2E;color:#888;padding:12px">Cancel</button>
      <button class="btn" onclick="saveBill()" style="flex:2;background:#00E5CC;color:#000;padding:12px;font-weight:600" id="saveBtn">Add Bill</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = {
  utilities:{label:"Utilities",icon:"⚡",color:"#00E5CC"},
  internet:{label:"Internet",icon:"📡",color:"#7C5CFC"},
  insurance:{label:"Insurance",icon:"🛡️",color:"#FC5C7D"},
  rent:{label:"Rent / Mortgage",icon:"🏠",color:"#F7B731"},
  subscriptions:{label:"Subscriptions",icon:"📦",color:"#45AAF2"},
  other:{label:"Other",icon:"📋",color:"#A8A8B3"}
};
const STATUS_META = {
  upcoming:{label:"Upcoming",color:"#F7B731"},
  paid:{label:"Paid",color:"#26de81"},
  overdue:{label:"Overdue",color:"#FC5C7D"}
};

let bills = JSON.parse(localStorage.getItem('billboard_bills') || 'null') || [
  {id:1,name:"Electricity",category:"utilities",amount:85,dueDay:5,status:"upcoming",notes:"Con Edison",autoPay:true},
  {id:2,name:"Internet",category:"internet",amount:59.99,dueDay:12,status:"paid",notes:"Comcast Xfinity",autoPay:true},
  {id:3,name:"Rent",category:"rent",amount:1850,dueDay:1,status:"overdue",notes:"Pay to landlord",autoPay:false},
  {id:4,name:"Netflix",category:"subscriptions",amount:15.49,dueDay:18,status:"upcoming",notes:"Family Plan",autoPay:true},
  {id:5,name:"Car Insurance",category:"insurance",amount:124,dueDay:22,status:"upcoming",notes:"State Farm",autoPay:false},
  {id:6,name:"Water Bill",category:"utilities",amount:42,dueDay:28,status:"upcoming",notes:"City Water Dept",autoPay:false}
];

let currentView = 'dashboard';
let currentFilter = 'all';
let editId = null;

const today = new Date().getDate();
document.getElementById('currentMonth').textContent = new Date().toLocaleString('default',{month:'long',year:'numeric'});

function save(){localStorage.setItem('billboard_bills',JSON.stringify(bills));}

function switchView(v){
  currentView = v;
  document.getElementById('viewDashboard').classList.toggle('hidden', v!=='dashboard');
  document.getElementById('viewBills').classList.toggle('hidden', v!=='bills');
  document.getElementById('navDashboard').classList.toggle('active', v==='dashboard');
  document.getElementById('navBills').classList.toggle('active', v==='bills');
  render();
}

function setFilter(f){
  currentFilter = f;
  ['all','upcoming','paid','overdue'].forEach(x=>{
    document.getElementById('filter'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active',x===f);
  });
  renderBillsTable();
}

function render(){
  if(currentView==='dashboard') renderDashboard();
  else renderBillsTable();
}

function renderDashboard(){
  const total = bills.reduce((s,b)=>s+Number(b.amount),0);
  const paid = bills.filter(b=>b.status==='paid').reduce((s,b)=>s+Number(b.amount),0);
  const overdue = bills.filter(b=>b.status==='overdue').reduce((s,b)=>s+Number(b.amount),0);
  const week = bills.filter(b=>b.status==='upcoming'&&b.dueDay-today>=0&&b.dueDay-today<=7);

  document.getElementById('statTotal').textContent='$'+total.toFixed(2);
  document.getElementById('statTotalSub').textContent=bills.length+' bills';
  document.getElementById('statPaid').textContent='$'+paid.toFixed(2);
  document.getElementById('statPaidSub').textContent=bills.filter(b=>b.status==='paid').length+' bills';
  document.getElementById('statOverdue').textContent='$'+overdue.toFixed(2);
  document.getElementById('statOverdueSub').textContent=bills.filter(b=>b.status==='overdue').length+' bills';
  document.getElementById('statWeek').textContent=week.length;
  document.getElementById('statWeekSub').textContent=week.map(b=>b.name).join(', ')||'None';

  const pct = total>0?Math.round((paid/total)*100):0;
  document.getElementById('progressPct').textContent=pct+'% paid';
  document.getElementById('progressBar').style.width=pct+'%';

  document.getElementById('legend').innerHTML=Object.entries(STATUS_META).map(([k,v])=>
    `<span class="legend-item"><span style="color:${v.color}">●</span> ${v.label}: ${bills.filter(b=>b.status===k).length}</span>`
  ).join('');

  const sorted = [...bills].filter(b=>b.status!=='paid').sort((a,b)=>a.dueDay-b.dueDay).slice(0,5);
  document.getElementById('upcomingList').innerHTML = sorted.length ? sorted.map(b=>`
    <div class="bill-mini">
      <div class="bill-mini-left">
        <span class="bill-mini-icon">${CATEGORIES[b.category]?.icon||'📋'}</span>
        <div>
          <div class="bill-mini-name">${b.name}</div>
          <div class="bill-mini-meta">Day ${b.dueDay} • ${b.autoPay?'AutoPay ✓':'Manual'}</div>
        </div>
      </div>
      <div>
        <div class="bill-mini-amount">$${Number(b.amount).toFixed(2)}</div>
        <span class="pill" style="background:${STATUS_META[b.status]?.color}22;color:${STATUS_META[b.status]?.color};font-size:10px">${b.status}</span>
      </div>
    </div>
  `).join('') : '<div style="color:#444;font-size:13px;padding:20px 0;text-align:center">All bills paid! 🎉</div>';
}

function renderBillsTable(){
  const filtered = currentFilter==='all' ? bills : bills.filter(b=>b.status===currentFilter);
  document.getElementById('billCount').textContent=filtered.length+' bills';
  document.getElementById('billsTable').innerHTML = filtered.length ? filtered.map(b=>`
    <div class="table-row bill-row">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:20px">${CATEGORIES[b.category]?.icon||'📋'}</span>
        <div>
          <div class="row-name">${b.name}</div>
          <div class="row-note">${b.notes||CATEGORIES[b.category]?.label}</div>
        </div>
      </div>
      <div class="row-amount">$${Number(b.amount).toFixed(2)}</div>
      <div class="row-day">Day ${b.dueDay}</div>
      <div><span class="pill" style="background:${STATUS_META[b.status]?.color}22;color:${STATUS_META[b.status]?.color}">${STATUS_META[b.status]?.label}</span></div>
      <div style="font-size:12px;color:${b.autoPay?'#26de81':'#555'}">${b.autoPay?'✓ Auto':'Manual'}</div>
      <div class="row-actions">
        ${b.status!=='paid'?`<button class="btn" onclick="markPaid(${b.id})" style="background:#26de8122;color:#26de81;border:1px solid #26de8144;padding:5px 10px;font-size:11px">Mark Paid</button>`:''}
        <button class="btn" onclick="openEdit(${b.id})" style="background:#1E1E2E;color:#888;padding:5px 10px;font-size:11px">Edit</button>
        <button class="btn" onclick="deleteBill(${b.id})" style="background:#FC5C7D22;color:#FC5C7D;padding:5px 10px;font-size:11px">✕</button>
      </div>
    </div>
  `).join('') : '<div style="padding:40px;text-align:center;color:#444;font-size:14px">No bills found</div>';
}

function openAdd(){
  editId=null;
  document.getElementById('modalTitle').textContent='Add New Bill';
  document.getElementById('saveBtn').textContent='Add Bill';
  document.getElementById('fName').value='';
  document.getElementById('fAmount').value='';
  document.getElementById('fDueDay').value='';
  document.getElementById('fCategory').value='utilities';
  document.getElementById('fStatus').value='upcoming';
  document.getElementById('fNotes').value='';
  document.getElementById('fAutoPay').checked=false;
  document.getElementById('modal').classList.remove('hidden');
}

function openEdit(id){
  const b=bills.find(x=>x.id===id);
  if(!b)return;
  editId=id;
  document.getElementById('modalTitle').textContent='Edit Bill';
  document.getElementById('saveBtn').textContent='Save Changes';
  document.getElementById('fName').value=b.name;
  document.getElementById('fAmount').value=b.amount;
  document.getElementById('fDueDay').value=b.dueDay;
  document.getElementById('fCategory').value=b.category;
  document.getElementById('fStatus').value=b.status;
  document.getElementById('fNotes').value=b.notes||'';
  document.getElementById('fAutoPay').checked=b.autoPay;
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal(){document.getElementById('modal').classList.add('hidden');}

function saveBill(){
  const name=document.getElementById('fName').value.trim();
  const amount=document.getElementById('fAmount').value;
  const dueDay=document.getElementById('fDueDay').value;
  if(!name||!amount||!dueDay)return;
  const bill={
    id:editId||Date.now(),
    name,amount:parseFloat(amount),dueDay:parseInt(dueDay),
    category:document.getElementById('fCategory').value,
    status:document.getElementById('fStatus').value,
    notes:document.getElementById('fNotes').value.trim(),
    autoPay:document.getElementById('fAutoPay').checked
  };
  if(editId){bills=bills.map(b=>b.id===editId?bill:b);}
  else{bills.push(bill);}
  save();closeModal();render();
}

function deleteBill(id){bills=bills.filter(b=>b.id!==id);save();render();}
function markPaid(id){bills=bills.map(b=>b.id===id?{...b,status:'paid'}:b);save();render();}

async function getAIInsight(){
  const btn=document.getElementById('aiBtn');
  const area=document.getElementById('aiArea');
  btn.textContent='Analyzing...';btn.disabled=true;
  area.innerHTML=`<div style="display:flex;gap:12px;align-items:flex-start;padding:14px;background:#0F0F18;border-radius:10px"><div style="font-size:20px" class="pulse">🤖</div><div style="font-size:13px;color:#555">Analyzing your bills...</div></div>`;
  const summary=bills.map(b=>`${b.name}: $${b.amount}, due day ${b.dueDay}, status: ${b.status}, autoPay: ${b.autoPay}`).join('\n');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:`You are a personal finance assistant. Analyze these monthly bills and give 3 short actionable insights. Today is day ${today} of the month.\n\nBills:\n${summary}\n\nGive insights as bullet points. Keep it concise. Mention overdue items first if any, then savings tips, then autopay suggestions.`}]
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'No insights available.';
    area.innerHTML=`<div class="ai-box">${text}</div>`;
  }catch(e){
    area.innerHTML=`<div class="ai-box" style="color:#FC5C7D">Unable to load AI insights. Make sure you're connected to the internet.</div>`;
  }
  btn.textContent='✦ Analyze';btn.disabled=false;
}

render();
</script>
</body>
</html>
